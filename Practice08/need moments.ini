execute(query, vars=None)  
Выполняет один SQL‑запрос.

query — текст запроса (SELECT ..., INSERT ...).

vars — параметры, которые подставляются в запрос (список или словарь).
👉 Используется для одиночных операций.

executemany(query, vars_list)  
Выполняет один параметризованный SQL‑запрос много раз.

vars_list — список наборов значений.
👉 Удобно для массовой вставки или обновления.

callproc(procname[, parameters])  
Вызывает хранимую функцию или процедуру в базе.

procname — имя функции/процедуры.

parameters — список или словарь параметров.
👉 Например, cursor.callproc('upsert_contact', ['Bob','Marley','+7777...']).

mogrify(operation[, parameters])  
Возвращает SQL‑запрос в виде строки после подстановки параметров, но не выполняет его.
👉 Полезно для отладки: посмотреть, какой именно SQL будет отправлен.

🔹 Методы получения данных
fetchone()  
Возвращает одну строку результата как кортеж.

Если строк больше нет → возвращает None.

fetchmany([size=cursor.arraysize])  
Возвращает список строк (по умолчанию cursor.arraysize, обычно 1–10).

Если строк больше нет → пустой список.

fetchall()  
Возвращает все оставшиеся строки результата как список.

Если строк нет → пустой список.

🔹 Управление курсором
scroll(value[, mode='relative'])  
Перемещает курсор по набору строк.

value — на сколько строк сдвинуться.

mode='relative' — смещение относительно текущей позиции.

mode='absolute' — перейти к конкретной позиции (например, к 5‑й строке).

🔹 Итог
execute / executemany / callproc → выполняют запросы.

mogrify → показывает, как будет выглядеть запрос.

fetchone / fetchmany / fetchall → забирают результаты.

scroll → двигает курсор по результатам.